<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易買賣平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f5f7f8; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .cart-btn { background-color: #e74c3c; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 3fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
        .product-card { background: white; border-radius: 8px; padding: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: space-between; }
        .product-img { width: 100%; height: 180px; background-color: #ddd; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #666; font-weight: bold; margin-bottom: 1rem; }
        .product-title { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .product-price { color: #e74c3c; font-weight: bold; font-size: 1.2rem; margin-bottom: 1rem; }
        .add-btn { background-color: #3498db; color: white; border: none; width: 100%; padding: 0.6rem; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .add-btn:hover { background-color: #2980b9; }
        .cart-section { background: white; border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); height: fit-content; }
        .cart-title { font-size: 1.3rem; margin-bottom: 1rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; font-size: 0.95rem; }
        .remove-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.8rem; margin-left: 0.5rem; }
        .cart-total { margin-top: 1.5rem; padding-top: 1rem; border-top: 2px solid #eee; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between; }
        .checkout-btn { background-color: #2ecc71; color: white; border: none; width: 100%; padding: 0.8rem; border-radius: 4px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 1rem; }
        .checkout-btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <header>
        <div class="logo">我的簡易買賣平台</div>
        <button class="cart-btn" onclick="scrollToCart()">購物車 (<span id="cart-count">0</span>)</button>
    </header>

    <div class="container">
        <!-- 商品列表區 -->
        <main>
            <h2 style="margin-bottom: 1.5rem;">今日嚴選商品</h2>
            <div class="products-grid" id="products-container">
                <!-- 商品會由 JS 動態生成 -->
            </div>
        </main>

        <!-- 購物車明細區 -->
        <aside class="cart-section" id="cart-section">
            <div class="cart-title">購物車明細</div>
            <div id="cart-items-container">
                <p style="color: #999; text-align: center;">購物車空空如也...</p>
            </div>
            <div class="cart-total">
                <span>總計：</span>
                <span>NT$ <span id="cart-total-price">0</span></span>
            </div>
            <button class="checkout-btn" onclick="checkout()">前往結帳</button>
        </aside>
    </div>

    <script>
        // 模擬商品資料（你可以自由修改這裡的名稱和價格）
        const products = [
            { id: 1, name: "潮流極簡純棉純T", price: 490, label: "👕 服飾" },
            { id: 2, name: "高音質無線藍牙耳機", price: 1980, label: "🎧 3C" },
            { id: 3, name: "極簡文青陶瓷馬克杯", price: 350, label: "☕ 生活" },
            { id: 4, name: "防潑水智能雙肩後背包", price: 1250, label: "🎒 包袋" },
            { id: 5, name: "人體工學記憶棉護腰墊", price: 680, label: "🪑 家居" },
            { id: 6, name: "自動感應微霧化消毒機", price: 550, label: "🧼 衛生" }
        ];

        // 購物車狀態
        let cart = [];

        // 初始化商品列表
        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(p => `
                <div class="product-card">
                    <div>
                        <div class="product-img">${p.label}</div>
                        <div class="product-title">${p.name}</div>
                    </div>
                    <div>
                        <div class="product-price">NT$ ${p.price}</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">加入購物車</button>
                    </div>
                </div>
            `).join('');
        }

        // 加入購物車
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existItem = cart.find(item => item.id === productId);

            if (existItem) {
                existItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
        }

        // 從購物車移除
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // 更新購物車畫面
        function updateCart() {
            const itemsContainer = document.getElementById('cart-items-container');
            const cartCount = document.getElementById('cart-count');
            const cartTotalPrice = document.getElementById('cart-total-price');

            // 更新數量標籤
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalCount;

            if (cart.length === 0) {
                itemsContainer.innerHTML = `<p style="color: #999; text-align: center;">購物車空空如也...</p>`;
                cartTotalPrice.textContent = '0';
                return;
            }

            // 渲染購物車品項
            itemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div>
                        <div>${item.name}</div>
                        <small style="color: #666;">NT$ ${item.price} x ${item.quantity}</small>
                    </div>
                    <button class="remove-btn" onclick="removeFromCart(${item.id})">移除</button>
                </div>
            `).join('');

            // 計算總價
            const totalMoney = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            cartTotalPrice.textContent = totalMoney.toLocaleString();
        }

        // 結帳提示
        function checkout() {
            if (cart.length === 0) {
                alert("您的購物車內還沒有商品喔！");
                return;
            }
            const totalMoney = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            alert(`感謝您的模擬購買！本次消費總金額為：NT$ ${totalMoney.toLocaleString()}\n（此為前端展示網頁，未串接後端金流）`);
            cart = [];
            updateCart();
        }

        // 行動版網頁滾動到購物車
        function scrollToCart() {
            document.getElementById('cart-section').scrollIntoView({ behavior: 'smooth' });
        }

        // 啟動
        renderProducts();
    </script>
</body>
</html>
